<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Greetings Generator App</title>
    <meta
      name="description"
      content="Create personalized, elegant birthday and occasion greetings in seconds. Free, no sign-up required."
    />
    <meta name="theme-color" content="#0d1117" />
    <meta property="og:title" content="Greetings Generator by RelateAi" />
    <meta property="og:description" content="Create personalized, heartfelt greetings in seconds. Free, no sign-up required." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <base href="/greetings-generator/" />
    <!-- Preconnect to external CDNs so connections start immediately -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&family=Nunito:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
    />
    <!-- App styles -->
    <link rel="stylesheet" href="style.css" />
    <!-- Instantly hide create screen if this is a shared link — runs before first paint -->
    <script>
      if (location.search.includes("id=")) document.documentElement.classList.add("is-shared");
    </script>
    <!-- Scripts — defer so they download in parallel without blocking render -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"
    ></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script
      defer
      src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"
    ></script>
    <script defer src="firebase.js"></script>
    <script defer src="script.js"></script>
  </head>
  <body>
    <noscript>
      <div style="padding:60px 24px;text-align:center;font-family:sans-serif;background:#fff8f6;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">
        <p style="font-size:2rem">💌</p>
        <p style="font-size:1.1rem;font-weight:700;color:#333">JavaScript is required</p>
        <p style="font-size:0.9rem;color:#666;max-width:300px;line-height:1.6">Please enable JavaScript in your browser settings to use the Greetings Generator.</p>
      </div>
    </noscript>
    <a href="#create-form" class="skip-link">Skip to form</a>
    <div id="theme-announce" class="sr-only" aria-live="assertive" aria-atomic="true"></div>
    <div id="app">
      <!-- ===================== CREATE SCREEN ===================== -->
      <div id="create-screen" class="screen">
        <div class="floating-elements" id="create-floats" aria-hidden="true"></div>

        <div class="screen-inner">
          <!-- Theme Carousel -->
          <div class="carousel-wrap" role="group" aria-label="Select occasion">
            <button class="carousel-btn" id="prev-btn" aria-label="Previous occasion theme">
              <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
            </button>
            <div class="carousel-label-wrap">
              <p class="by-relateai" id="by-relateai">
                <span class="by-word">by</span><span class="relateai-word">RelateAi</span>
              </p>
              <div class="carousel-label" id="carousel-label">
                <span class="carousel-emoji" id="carousel-emoji"></span>
                <span class="carousel-text" id="carousel-text"></span>
              </div>
            </div>
            <button class="carousel-btn" id="next-btn" aria-label="Next occasion theme">
              <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
            </button>
          </div>
          <div
            class="carousel-dots"
            id="carousel-dots"
            role="tablist"
            aria-label="Occasion themes"
          ></div>

          <!-- Heading -->
          <div class="heading-wrap">
            <h1 class="main-heading" id="create-heading">
              <span class="heading-line1" id="heading-line1"></span>
              <span class="heading-line2" id="heading-line2"></span>
            </h1>
            <p class="heading-sub" id="heading-sub">
              Turn a simple name and photo into a beautiful personalized greeting in seconds.
            </p>
          </div>

          <!-- Form Card -->
          <form class="glass-card create-form" id="create-form" novalidate>
            <!-- Name input -->
            <div class="form-group">
              <label class="field-label" for="name-input">Enter Name</label>
              <input
                type="text"
                class="name-input"
                id="name-input"
                maxlength="40"
                autocomplete="off"
                spellcheck="false"
                autocapitalize="words"
              />
              <span class="char-counter" id="char-counter" aria-live="polite"></span>
            </div>

            <!-- Photo upload -->
            <div class="form-group">
              <label class="field-label">
                Upload Photo
                <span class="optional-tag">(Optional)</span>
              </label>
              <div
                class="drop-zone"
                id="drop-zone"
                role="button"
                tabindex="0"
                aria-label="Upload photo by clicking or dragging a file here"
              >
                <!-- Empty state -->
                <div class="dz-empty" id="dz-empty">
                  <div class="dz-icon-wrap" id="dz-icon-wrap">
                    <i
                      class="fa-solid fa-camera dz-camera-icon"
                      id="dz-camera-icon"
                      aria-hidden="true"
                    ></i>
                  </div>
                  <div class="dz-text">
                    <p class="dz-primary">Tap to upload a photo</p>
                    <p class="dz-secondary">or drag and drop here</p>
                  </div>
                  <div class="dz-hint" aria-hidden="true">
                    <i class="fa-solid fa-upload"></i>
                    <span>PNG, JPG up to 10MB</span>
                  </div>
                </div>
                <!-- Preview state -->
                <div class="dz-preview" id="dz-preview">
                  <img class="preview-img" id="preview-img" src="" alt="Uploaded photo preview" />
                  <div class="preview-info">
                    <p class="preview-uploaded" id="preview-uploaded">Photo uploaded!</p>
                    <p class="preview-change">Tap to change</p>
                  </div>
                  <button
                    type="button"
                    class="preview-remove"
                    id="preview-remove"
                    aria-label="Remove uploaded photo"
                  >
                    Remove
                  </button>
                </div>
              </div>
              <input
                type="file"
                id="file-input"
                accept="image/*"
                aria-hidden="true"
                tabindex="-1"
              />
            </div>

            <!-- Sender name -->
            <div class="form-group">
              <label class="field-label" for="sender-input">
                Your Name
                <span class="optional-tag">(So they know who it's from)</span>
              </label>
              <input
                type="text"
                class="name-input"
                id="sender-input"
                maxlength="40"
                placeholder="Enter your name…"
                autocomplete="off"
                spellcheck="false"
                autocapitalize="words"
              />
            </div>

            <!-- Spotify link -->
            <div class="form-group">
              <label class="field-label" for="spotify-input">
                Add a Song
                <span class="optional-tag">(Optional)</span>
              </label>
              <div class="spotify-input-wrap">
                <i class="fa-brands fa-spotify spotify-input-icon" aria-hidden="true"></i>
                <input
                  type="text"
                  class="spotify-input"
                  id="spotify-input"
                  placeholder="Paste a Spotify song link…"
                  autocomplete="off"
                  spellcheck="false"
                />
              </div>
              <p class="spotify-hint" id="spotify-hint" aria-live="polite"></p>
            </div>

            <!-- Terms checkbox -->
            <label class="terms-checkbox-wrap">
              <input type="checkbox" id="terms-checkbox" />
              <span class="terms-checkbox-text"
                >I agree to the
                <a href="privacy.html" target="_blank" class="terms-link"
                  >Terms &amp; Conditions and Privacy Policy</a
                >.</span
              >
            </label>

            <!-- Generate Button -->
            <button type="submit" class="generate-btn" id="generate-btn" disabled>
              <i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i>
              <strong id="generate-label">Generate Greetings</strong>
            </button>
            <p class="generate-hint" id="generate-hint" aria-live="polite"></p>
          </form>
        </div>
      </div>

      <!-- ===================== REVEAL SCREEN ===================== -->
      <div id="reveal-screen" class="screen" style="display: none">
        <div class="floating-elements" id="reveal-floats" aria-hidden="true"></div>
        <div class="avatar-glow" id="avatar-glow" aria-hidden="true"></div>

        <div class="screen-inner reveal-inner">
          <!-- Avatar -->
          <div class="avatar-wrap" id="avatar-wrap">
            <div class="avatar-ring" id="avatar-ring" aria-hidden="true"></div>
            <div class="avatar-circle" id="avatar-circle">
              <img class="avatar-img" id="avatar-img" src="" alt="" />
              <i class="fa-solid fa-heart avatar-heart" id="avatar-heart" aria-hidden="true"></i>
            </div>
            <div class="emoji-badge" id="emoji-badge" aria-hidden="true"></div>
          </div>

          <!-- Greeting -->
          <div class="greeting-section">
            <h1 class="greeting-heading" id="greeting-heading"></h1>
          </div>

          <!-- Greeting Card -->
          <div class="greeting-card glass-card" id="greeting-card">
            <div class="card-accent-line" id="card-accent-line" aria-hidden="true"></div>
            <div class="card-badge-row">
              <div class="card-badge-pill" id="card-badge-pill">
                <div class="card-emoji-box" id="card-emoji-box" aria-hidden="true"></div>
                <p class="card-badge-text" id="card-badge-text"></p>
              </div>
            </div>
            <p class="greeting-text" id="greeting-text"></p>
            <div class="card-footer-row"></div>
          </div>

          <!-- Reserved AdSense area -->
          <div class="sponsor-zone" id="sponsor-zone">
            <span class="sponsor-label">Sponsored</span>
          </div>
          <!-- Spotify Player -->
          <div class="spotify-player-wrap" id="spotify-player-wrap" style="display: none">
            <p class="spotify-player-label">
              <i class="fa-brands fa-spotify" aria-hidden="true"></i>
              Now Playing
            </p>
            <div id="spotify-player-container"></div>
          </div>

          <!-- Action Buttons -->
          <div class="reveal-actions">
            <button class="btn-primary-action" id="share-btn">
              <i class="fa-solid fa-envelope" aria-hidden="true"></i>
              Share Your Greeting
            </button>
            <button class="btn-secondary-action" id="new-greeting-btn">
              <i class="fa-solid fa-rotate-right" aria-hidden="true"></i>
              Try a Different Message
            </button>
            <button class="btn-ghost-action" id="reset-btn">
              <i class="fa-solid fa-rotate-left" aria-hidden="true"></i>
              Start over
            </button>
          </div>
        </div>
      </div>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>
    <!-- /#app -->

    <!-- Shared-link loading overlay -->
    <div class="shared-loader" id="shared-loader">
      <div class="loader-box" tabindex="-1">
        <span class="loader-icon" id="loader-icon">🎁</span>
        <h2 class="loader-heading">Something special<br />is loading for you</h2>
        <div class="l-spinner">
          <div class="l-bar"></div>
          <div class="l-bar"></div>
          <div class="l-bar"></div>
          <div class="l-bar"></div>
          <div class="l-bar"></div>
          <div class="l-bar"></div>
          <div class="l-bar"></div>
          <div class="l-bar"></div>
          <div class="l-bar"></div>
          <div class="l-bar"></div>
          <div class="l-bar"></div>
          <div class="l-bar"></div>
        </div>
        <p class="loader-sub" id="loader-sub">Hold on, magic incoming ✨</p>
      </div>
    </div>
  </body>
</html>
